services:
  backend:
    image: ghcr.io/${IMAGE_OWNER}/itops-backend:${IMAGE_TAG}
    container_name: itops-backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      DATABASE_PATH: /app/data/app.db
    volumes:
      - itops-data:/app/data
      - itops-backups:/app/backups
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s

volumes:
  itops-data:
  itops-backups:
