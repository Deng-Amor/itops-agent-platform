name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image names
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/itops-backend:${{ github.sha }}
            ghcr.io/${{ env.IMAGE_OWNER }}/itops-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend dist
        working-directory: frontend
        run: |
          npm ci --verbose 2>&1 | tail -50
          npm run build 2>&1

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SERVER_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Copy deployment file
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" "command -v nginx >/dev/null || (apt-get update && apt-get install -y nginx); mkdir -p /opt/itops-agent /var/www/itops-agent /etc/nginx/conf.d"
          scp -i ~/.ssh/deploy_key -P "${{ secrets.SERVER_PORT }}" docker-compose.deploy.yml "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/itops-agent/docker-compose.yml"
          scp -i ~/.ssh/deploy_key -P "${{ secrets.SERVER_PORT }}" -r frontend/dist/. "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/itops-agent/"
          scp -i ~/.ssh/deploy_key -P "${{ secrets.SERVER_PORT }}" docker/nginx.host.conf "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/etc/nginx/conf.d/itops-agent.conf"

      - name: Initialize server configuration
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            'cd /opt/itops-agent && if [ ! -f .env ]; then umask 077; printf "JWT_SECRET=%s\n" "$(head -c 48 /dev/urandom | base64 | tr -d "\n")" > .env; fi; sed -i "/^ALLOWED_ORIGINS=/d" .env; echo "ALLOWED_ORIGINS=https://aiops.amorai.dpdns.org,http://aiops.amorai.dpdns.org" >> .env'

      - name: Login to GHCR on server
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: printf '%s' "$GHCR_TOKEN" | ssh -i ~/.ssh/deploy_key -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" "docker login ghcr.io -u '${{ github.actor }}' --password-stdin"

      - name: Deploy and verify
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "cd /opt/itops-agent && test -f .env && IMAGE_OWNER='${IMAGE_OWNER}' IMAGE_TAG='${{ github.sha }}' docker compose pull && IMAGE_OWNER='${IMAGE_OWNER}' IMAGE_TAG='${{ github.sha }}' docker compose up -d --remove-orphans && sleep 30 && docker compose ps && echo '=== Container logs ===' && docker compose logs backend --tail 50 && nginx -t && systemctl reload nginx && sleep 60 && if curl --fail --retry 30 --retry-delay 5 --retry-connrefused http://localhost:3001/health; then echo '✅ Deployment successful'; else echo '❌ Health check failed, showing full container logs:'; docker compose logs backend --tail 200; exit 1; fi"
