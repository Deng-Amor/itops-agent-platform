server {
    listen 80;
    server_name aiops.amorai.dpdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name aiops.amorai.dpdns.org;
    
    ssl_certificate /etc/letsencrypt/live/aiops.amorai.dpdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aiops.amorai.dpdns.org/privkey.pem;
    
    root /var/www/itops-agent;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://127.0.0.1:3001/api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /socket.io {
        proxy_pass http://127.0.0.1:3001/socket.io;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}